# Server
spring.config.import=optional:file:./application-secrets.properties
server.port=${PORT:5000}
server.servlet.context-path=/api

# Database (MySQL)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/smartbarcode_db?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root123}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# JWT Configuration
jwt.secret=${JWT_SECRET:your_jwt_secret_here}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# AI Configuration (Gemini)
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.smartbarcode=DEBUG
logging.level.org.springframework.security=WARN

# Email Configuration (Replace with your actual SMTP credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=naveensri4518@gmail.com
spring.mail.password=${EMAIL_PASSWORD:your_email_password_here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SMS Mobile API Configuration
sms.api.key=${SMS_API_KEY:your_sms_api_key_here}
sms.api.url=https://api.smsmobileapi.com/sendsms/
